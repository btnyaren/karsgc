<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Batın Gece Yolcusu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19; 
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none; 
        }

        h1 { 
            margin-bottom: 5px; 
            font-size: 26px;
            letter-spacing: 2px;
            color: #e74c3c;
            text-shadow: 0 0 10px rgba(231, 76, 60, 0.6);
        }
        
        #scoreBoard {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #f1c40f;
            text-shadow: 0 0 8px rgba(241, 196, 15, 0.5);
            background-color: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #34495e;
        }

        #scoreBoard span {
            color: #ecf0f1;
        }

        canvas {
            border: 4px solid #34495e;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            background-color: #151a24;
            max-width: 100%; 
            height: auto;
            max-height: 72vh;
            touch-action: none;
        }

        p { color: #7f8c8d; font-size: 14px; margin-top: 15px; }
        
        @media (max-width: 600px) {
            h1 { font-size: 22px; }
            p { display: none; } 
        }
    </style>
</head>
<body>

    <h1>BATIN GECE YOLCUSU</h1>
    <div id="scoreBoard">
        Hız: <span id="speed">90</span> km/h &nbsp;|&nbsp; Mesafe: <span id="score">0</span> km
    </div>
    
    <canvas id="gameCanvas" width="360" height="580"></canvas>
    
    <p>PC: <b>Sol/Sağ Yön Tuşları</b> | Mobil: <b>Ekranın Sağına/Soluna Dokun</b></p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const speedElement = document.getElementById("speed"); 

        // sıkoda foto
       const playerImg = new Image();
        playerImg.src = "./araba.png.jpg"; // "e" harfini sildik, tam resimdeki gibi oldu

        const enemyImg = new Image();
        enemyImg.src = "./engel.png.jpg"; // "e" harfini sildik, tam resimdeki gibi oldu

        const crashImg = new Image();
        crashImg.src = "./kaza.png.jpeg"; // Bu zaten .jpeg yüklenmiş, aynen kalıyor 

        let frames = 0;
        let score = 0;
        let gameOver = false;
        let gameActive = false; 
        let gameSpeed = 6;
        let roadOffset = 0; 

        const player = {
            x: 155, 
            y: 460, 
            width: 50,
            height: 85,
            speed: 7, 
            dx: 0     
        };

        let obstacles = [];

        document.addEventListener("keydown", (e) => {
            if (!gameActive && !gameOver) gameActive = true;
            if (e.key === "ArrowLeft") player.dx = -player.speed;
            else if (e.key === "ArrowRight") player.dx = player.speed;
        });

        document.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft" || e.key === "ArrowRight") player.dx = 0;
        });

        canvas.addEventListener("touchstart", function(e) {
            e.preventDefault(); 
            
            if (gameOver) {
                location.reload();
                return;
            }
            if (!gameActive) {
                gameActive = true;
            }

            let rect = canvas.getBoundingClientRect();
            let touchX = e.touches[0].clientX - rect.left;

            if (touchX < rect.width / 2) {
                player.dx = -player.speed; 
            } else {
                player.dx = player.speed;  
            }
        }, { passive: false });

        canvas.addEventListener("touchend", function(e) {
            e.preventDefault();
            player.dx = 0; 
        }, { passive: false });

        canvas.addEventListener("mousedown", (e) => {
            if (gameOver) {
                location.reload();
                return;
            }
            if (!gameActive) {
                gameActive = true;
            }
            let rect = canvas.getBoundingClientRect();
            let clickX = e.clientX - rect.left;
            if (clickX < rect.width / 2) player.dx = -player.speed;
            else player.dx = player.speed;
        });
        
        canvas.addEventListener("mouseup", () => { player.dx = 0; });

        function spawnObstacle() {
            let minX = 35;
            let maxX = canvas.width - 85;
            let obstacleX = Math.random() * (maxX - minX) + minX;
            
            obstacles.push({
                x: obstacleX,
                y: -100, 
                width: 48,
                height: 80
            });
        }

        function drawRoad() {
            ctx.fillStyle = "#151a24";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#0d1117";
            ctx.fillRect(0, 0, 25, canvas.height);
            ctx.fillRect(canvas.width - 25, 0, 25, canvas.height);

            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(25, 0, 4, canvas.height);
            ctx.fillRect(canvas.width - 29, 0, 4, canvas.height);

            ctx.fillStyle = "#ffffff";
            if (gameActive && !gameOver) {
                roadOffset += gameSpeed;
                if (roadOffset > 60) roadOffset = 0;
            }
            
            for (let y = -60 + roadOffset; y < canvas.height; y += 60) {
                ctx.fillRect(canvas.width / 2 - 2, y, 4, 30);
            }
        }

        function update() {
            drawRoad();

            if (!gameActive && !gameOver) {
                ctx.fillStyle = "rgba(11, 15, 25, 0.85)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ecf0f1";
                ctx.font = "bold 20px Arial";
                ctx.fillText("GECE YOLCULUĞU BAŞLIYOR", 45, 260);
                ctx.fillStyle = "#e74c3c";
                ctx.font = "16px Arial";
                ctx.fillText("Başlamak için Ekrana Dokun", 70, 300);
            }

            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                if(crashImg.complete && crashImg.naturalHeight !== 0) {
                    ctx.drawImage(crashImg, canvas.width/2 - 60, 150, 120, 120);
                }

                ctx.fillStyle = "#e74c3c";
                ctx.font = "bold 28px Arial";
                ctx.fillText("KAZA YAPILDI!", 85, 310);
                ctx.fillStyle = "#ecf0f1";
                ctx.font = "16px Arial";
                ctx.fillText(`Toplam Mesafe: ${score} km`, 110, 340);
                ctx.fillStyle = "#f1c40f";
                ctx.fillText("Yeniden başlamak için dokun", 75, 380);
                return; 
            }

            if (gameActive && !gameOver) {
                player.x += player.dx;
                if (player.x < 30) player.x = 30; 
                if (player.x + player.width > canvas.width - 30) player.x = canvas.width - 30 - player.width; 

                for (let i = 0; i < obstacles.length; i++) {
                    let obs = obstacles[i];
                    obs.y += gameSpeed; 

                    if(enemyImg.complete && enemyImg.naturalHeight !== 0) {
                        ctx.drawImage(enemyImg, obs.x, obs.y, obs.width, obs.height);
                    } else {
                        ctx.fillStyle = "#3498db";
                        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    }

                    if (
                        player.x < obs.x + obs.width &&
                        player.x + player.width > obs.x &&
                        player.y < obs.y + obs.height &&
                        player.y + player.height > obs.y
                    ) {
                        gameOver = true; 
                    }

                    if (obs.y > canvas.height) {
                        obstacles.splice(i, 1);
                        score += 10;
                        scoreElement.innerText = score;
                        i--; 
                        
                        if (score % 100 === 0) {
                            gameSpeed += 0.7; 
                            speedElement.innerText = Math.floor(gameSpeed * 15);
                        }
                    }
                }

                frames++;
                if (frames % 55 === 0) {
                    spawnObstacle();
                }
            }

            if(playerImg.complete && playerImg.naturalHeight !== 0) {
                ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
            } else {
                ctx.fillStyle = "#c0392b";
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
